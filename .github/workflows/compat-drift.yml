#
# compat-drift: a scheduled (NOT PR-gating) probe with two legs.
#
#   (a) pin leg  — rebuild the v0.96.0-pinned harness, regenerate vectors, and
#       run the committed-vector tests. This MUST stay green: a failure means
#       the pinned harness or its toolchain has rotted (e.g. a yanked transitive
#       dep, a vanished tag), which is a real alarm worth a red run.
#
#   (b) main leg — build the drift micro-crate against upstream `main`,
#       regenerate the version-stable domains, and diff/test them against the
#       committed v0.96.0 vectors. This is INFORMATIONAL: it is allowed to fail
#       (continue-on-error) and, on failure, files a deduplicated tracking issue
#       labelled `compat-drift`. A primitive's bytes changing upstream is news,
#       not a build break.
#
# This workflow is NEVER a required check and NEVER gates a PR — it only runs on
# a weekly cron and on manual dispatch.

name: compat-drift

on:
  schedule:
    # Mondays 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch:

# issues: write is needed for the main leg's `gh issue create`.
permissions:
  contents: read
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # (a) pin leg — must be green.
  # ---------------------------------------------------------------------------
  pin:
    name: pin (v0.96.0 harness must stay green)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compat/rust-harness

      - name: build pinned harness (release)
        working-directory: compat/rust-harness
        run: cargo build --release

      # Regenerate every committed domain from the pinned harness into a temp
      # dir and diff against the committed vectors. Identical bytes prove the
      # pin + toolchain still reproduce the committed vectors exactly.
      - name: regenerate vectors and diff against committed
        run: |
          set -euo pipefail
          bin="compat/rust-harness/target/release/rust-harness"
          tmp="$(mktemp -d)"
          # Full-domain pin leg (Stage 2): the pinned harness has the complete
          # session/group/sealed RPC surface, so it regenerates every committed
          # compat/vectors domain — not just the version-stable primitives the
          # drift micro-crate is limited to. All must reproduce byte-for-byte.
          for domain in curve kem-decaps hkdf messages fingerprint sessions groups sealedsender; do
            "$bin" gen-vectors "$domain" > "$tmp/$domain.json"
            if ! diff -u "compat/vectors/$domain.json" "$tmp/$domain.json"; then
              echo "::error::pinned harness no longer reproduces compat/vectors/$domain.json"
              exit 1
            fi
          done
          echo "all committed vectors reproduced byte-for-byte by the v0.96.0 pin"

      - name: vector consumption tests
        run: go test ./compat/ -v

  # ---------------------------------------------------------------------------
  # (b) main leg — informational; files a deduped issue on drift.
  # ---------------------------------------------------------------------------
  main-drift:
    name: main-drift (informational)
    runs-on: ubuntu-latest
    # Independent of the pin leg: a pin failure shouldn't suppress the drift
    # probe, and vice versa.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compat/rust-harness-drift

      # Force a fresh resolve of the `main` git dependency every run: the drift
      # crate does not commit Cargo.lock, but the cache could otherwise serve a
      # stale `main`. This is what makes the probe actually track `main`.
      - name: update drift crate to latest upstream main
        id: build
        continue-on-error: true
        working-directory: compat/rust-harness-drift
        run: |
          set -euo pipefail
          cargo update -p libsignal-protocol
          cargo build --release

      # Regenerate the version-stable domains from `main` and diff against the
      # committed v0.96.0 vectors. Any difference (or a build failure above) is
      # drift. We capture a short report for the issue body via an env var, never
      # interpolating untrusted input into the shell.
      - name: detect drift
        id: drift
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          set -uo pipefail
          bin="compat/rust-harness-drift/target/release/rust-harness-drift"
          tmp="$(mktemp -d)"
          drifted=""
          for domain in curve kem-decaps hkdf; do
            if ! "$bin" gen-vectors "$domain" > "$tmp/$domain.json" 2> "$tmp/$domain.err"; then
              drifted="$drifted- $domain: generator failed on main (see run logs)\n"
              continue
            fi
            if ! diff -q "compat/vectors/$domain.json" "$tmp/$domain.json" > /dev/null; then
              drifted="$drifted- $domain: bytes differ from the committed v0.96.0 vectors\n"
            fi
          done
          if [ -n "$drifted" ]; then
            echo "drift detected:"
            printf "%b" "$drifted"
            {
              echo "drifted=true"
              echo "report<<DRIFT_EOF"
              printf "%b" "$drifted"
              echo "DRIFT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "no drift: main reproduces the version-stable vectors"
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          fi

      # File a tracking issue when the build failed OR drift was detected,
      # deduplicating against any open compat-drift issue so a persistent drift
      # doesn't open a new issue every week.
      - name: file drift issue (deduped)
        if: steps.build.outcome != 'success' || steps.drift.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          DRIFT_REPORT: ${{ steps.drift.outputs.report }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          existing="$(gh issue list --label compat-drift --state open --json number --jq 'length')"
          if [ "$existing" != "0" ]; then
            echo "an open compat-drift issue already exists; skipping (dedupe)"
            exit 0
          fi
          if [ "$BUILD_OUTCOME" != "success" ]; then
            body="The compat-drift main leg failed to build the drift crate against upstream \`main\`."$'\n\n'"This may mean upstream \`main\` needs a newer Rust toolchain (bump compat/rust-harness-drift/rust-toolchain.toml) or changed an API the drift crate calls."$'\n\n'"Run: $RUN_URL"
          else
            body="The drift crate built against upstream \`main\` produced version-stable vectors that differ from the committed v0.96.0 vectors:"$'\n\n'"$(printf "%b" "$DRIFT_REPORT")"$'\n'"Review whether the upstream change affects the pure-Go port; if intentional, re-pin and regenerate the committed vectors. This is informational and does not gate any PR."$'\n\n'"Run: $RUN_URL"
          fi
          gh issue create \
            --title "compat-drift: upstream main diverges from the v0.96.0 vectors" \
            --label compat-drift \
            --body "$body"
