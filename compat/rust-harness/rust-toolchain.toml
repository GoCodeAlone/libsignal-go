# Pins the toolchain used to build the compat harness against upstream
# libsignal-protocol v0.91.0. This mirrors the channel that v0.91.0's own
# rust-toolchain pins (the harness must compile under the same toolchain as the
# upstream code it links). rustup fetches this toolchain on demand.

[toolchain]
channel = "nightly-2026-03-23"
