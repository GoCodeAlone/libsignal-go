version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - revive
  exclusions:
    # Skip protobuf-generated code: it is machine-written and re-generated
    # from proto/*.proto, so style/lint findings there are not actionable.
    generated: strict
    paths:
      - proto/
    rules:
      # internal/crypto deliberately shadows the stdlib "crypto" package name
      # (the import path is fixed by the implementation plan). The package is
      # import-restricted to this module, so the shadowing is harmless; revive
      # otherwise reports it once per file, which is pure noise here.
      - path: internal/crypto/
        text: 'var-naming: avoid package names that conflict with Go standard library'
        linters:
          - revive
      # The compat vector consumer reads committed test-fixture JSON by a path
      # built from a constant dir + a fixed domain name (G304), and decodes
      # vectors whose field is literally named "private_key" — test-vector data,
      # not a live secret (G117). Both are false positives in this test.
      - path: compat/vectors_test\.go
        linters:
          - gosec
      # The ratchet KAT test reads the committed compat/vectors/hkdf.json fixture
      # by a fixed relative path (G304) — same controlled-fixture pattern as the
      # compat consumer above; a false positive in a test.
      - path: ratchet/keys_test\.go
        linters:
          - gosec
      # The session tests build proto fields from small, deterministic loop
      # counters; gosec G115 flags the int->uint32 / uint32->byte conversions as
      # overflow, but every value is provably bounded — false positive in a test.
      - path: session/record_test\.go
        linters:
          - gosec
      # SessionState / SessionRecord are named to match the task spec and the
      # upstream libsignal types (SessionState, SessionRecord). The session.
      # prefix "stutter" is intentional and worth the parity; suppress revive's
      # stutter warning for these two exported types.
      - path: session/
        text: 'stutters; consider calling this (Record|State)'
        linters:
          - revive
